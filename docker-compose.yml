version: "3.9"

x-common: &common
  env_file: .env
  volumes:
    - ./data:/app/data

services:
  # ── Ollama (local LLaMA 3) ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Scraper (on-demand) ───────────────────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: infra/Dockerfile.scraper
    <<: *common
    command: python -m scraper.crawl
    depends_on:
      ollama:
        condition: service_healthy
    profiles: ["scraper"]   # run with: docker compose --profile scraper up scraper

  # ── Pipeline / ETL (on-demand) ────────────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: infra/Dockerfile.scraper
    <<: *common
    command: >
      sh -c "python -m pipeline.run &&
             python -m rag.retriever --build"
    profiles: ["pipeline"]

  # ── RAG API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    <<: *common
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Streamlit UI ──────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: infra/Dockerfile.ui
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:8000

volumes:
  ollama_data:
